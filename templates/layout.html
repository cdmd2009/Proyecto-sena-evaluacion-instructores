<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}SENA{% endblock %}</title>
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  
  <link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
  {% block styles %}{% endblock %}
</head>
<body>

  <div class="app-wrapper">

    <aside class="sidebar">

      <div class="sidebar-logo">
        <img src="{{ url_for('static', filename='icons/logo-sena.png') }}" alt="Logo SENA" class="logo-mark">
        <div class="logo-text">
          <strong>SENA</strong>
          <span>Evaluación de Instructores</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a href="{{ url_for('home') }}" class="nav-item {% if request.endpoint == 'home' %}active{% endif %}">
          <i class="bi bi-house"></i> Inicio
        </a>
        <a href="{{ url_for('instructores') }}" class="nav-item {% if request.endpoint == 'instructores' %}active{% endif %}">
          <i class="bi bi-people"></i> Instructores
        </a>
        <a href="{{ url_for('evaluaciones') }}" class="nav-item {% if request.endpoint == 'evaluaciones' %}active{% endif %}">
          <i class="bi bi-clipboard-check"></i> Evaluaciones
        </a>
        <a href="{{ url_for('reportes') }}" class="nav-item {% if request.endpoint == 'reportes' %}active{% endif %}">
          <i class="bi bi-bar-chart"></i> Reportes
        </a>
        <a href="{{ url_for('fichas') }}" class="nav-item {% if request.endpoint == 'fichas' %}active{% endif %}">
          <i class="bi bi-card-text"></i> Fichas
        </a>
        <a href="{{ url_for('contacto') }}" class="nav-item {% if request.endpoint == 'contacto' %}active{% endif %}">
          <i class="bi bi-envelope"></i> Contacto
        </a>
      </nav>

    </aside>

    <div class="main-area">

      <header class="topbar">

        <button class="topbar-hamburger" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>

        <div class="topbar-search">
          <i class="bi bi-search search-icon"></i>
          <input type="search" placeholder="Buscar…">
        </div>

        <div class="topbar-actions">
          <button class="icon-btn"><i class="bi bi-bell"></i><span class="notif-dot"></span></button>
          <button class="icon-btn"><i class="bi bi-chat"></i></button>
          <button class="icon-btn"><i class="bi bi-activity"></i></button>
        </div>

        <div class="topbar-user">
          <div class="user-avatar">A</div>
          <div class="user-info">
            <span class="user-name">Aprendiz</span>
            <span class="user-role">Aprendiz</span>
          </div>
          <i class="bi bi-chevron-down chevron"></i>
        </div>

      </header>

      <main class="page-content">
        {% block content %}{% endblock %}
      </main>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    document.getElementById('sidebarToggle').addEventListener('click', () => {
      document.querySelector('.sidebar').classList.toggle('sidebar--open');
    });
  </script>

</body>
</html>
